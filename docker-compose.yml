services:
  # ---- 后端 (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tulipagent-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file: .env
    expose:
      - "8000"
    networks:
      - tulipagent

  # ---- 前端 (Next.js) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: tulipagent-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - tulipagent

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:1.27-alpine
    container_name: tulipagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html/camellia-ssj:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tulipagent

networks:
  tulipagent:
    driver: bridge
