services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tulipagent-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DEBUG=false
    volumes:
      - ./data:/app/data
    networks:
      - tulipagent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tulipagent-frontend
    restart: unless-stopped
    networks:
      - tulipagent
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - tulipagent

networks:
  tulipagent:
    driver: bridge
