services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tulipagent-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DEBUG=false
    volumes:
      - ./data:/app/data
    networks:
      - tulipagent

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: tulipagent-frontend
    restart: unless-stopped
    networks:
      - tulipagent

  nginx:
    image: nginx:alpine
    container_name: tulipagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tulipagent

networks:
  tulipagent:
    driver: bridge
